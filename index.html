<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broke Mode — Meal Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <style>
      /* ── RESET & BASE ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --black: #0a0a0a;
        --white: #fafafa;
        --gray-50: #f7f7f7;
        --gray-100: #efefef;
        --gray-200: #dcdcdc;
        --gray-300: #c4c4c4;
        --gray-400: #a0a0a0;
        --gray-500: #737373;
        --gray-600: #525252;
        --gray-700: #3a3a3a;
        --gray-800: #262626;
        --gray-900: #141414;
        --accent-green: #10b981;
        --accent-red: #ef4444;
        --accent-yellow: #f59e0b;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 18px;
        --radius-xl: 24px;
        --shadow-sm:
          0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-md:
          0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
        --shadow-lg:
          0 12px 40px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.06);
        --font: "DM Sans", system-ui, sans-serif;
        --mono: "DM Mono", monospace;
        --nav-h: 64px;
        --bottom-nav-h: 72px;
        --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      html {
        font-size: 16px;
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font);
        background: var(--gray-50);
        color: var(--black);
        min-height: 100dvh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gray-300);
        border-radius: 4px;
      }

      /* ── DESKTOP SIDEBAR LAYOUT ── */
      .app-shell {
        display: flex;
        min-height: 100dvh;
      }

      /* ── SIDEBAR (DESKTOP) ── */
      .sidebar {
        display: none;
        flex-direction: column;
        width: 72px;
        background: var(--white);
        border-right: 1px solid var(--gray-100);
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
        align-items: center;
        padding: 20px 0;
        gap: 8px;
      }

      .sidebar-logo {
        width: 38px;
        height: 38px;
        background: var(--black);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        font-size: 18px;
        transition: transform var(--transition);
      }
      .sidebar-logo:hover {
        transform: scale(1.05);
      }

      .sidebar-nav-item {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all var(--transition);
        font-size: 19px;
        position: relative;
        border: none;
        background: transparent;
      }
      .sidebar-nav-item:hover {
        background: var(--gray-100);
      }
      .sidebar-nav-item.active {
        background: var(--black);
      }
      .sidebar-nav-item.active span {
        filter: invert(1);
      }
      .sidebar-nav-item .badge {
        position: absolute;
        top: 4px;
        right: 4px;
        background: var(--accent-red);
        color: white;
        font-size: 10px;
        font-weight: 600;
        min-width: 16px;
        height: 16px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
        font-family: var(--mono);
      }

      /* ── MAIN CONTENT ── */
      .main-content {
        flex: 1;
        min-width: 0;
        padding-bottom: calc(var(--bottom-nav-h) + 16px);
        max-width: 100%;
      }

      /* ── TOP HEADER ── */
      .top-header {
        background: rgba(250, 250, 250, 0.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--gray-100);
        position: sticky;
        top: 0;
        z-index: 90;
        padding: 0 20px;
        height: var(--nav-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header-logo {
        width: 32px;
        height: 32px;
        background: var(--black);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: transform var(--transition);
      }
      .header-logo:hover {
        transform: scale(1.05);
      }
      .header-title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }
      .header-sub {
        font-size: 11px;
        color: var(--gray-400);
        font-weight: 400;
        display: none;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .badge-pill {
        background: var(--gray-100);
        border: 1px solid var(--gray-200);
        border-radius: 100px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 500;
        color: var(--gray-600);
        font-family: var(--mono);
        transition: all var(--transition);
      }
      .badge-pill.live {
        background: var(--black);
        color: var(--white);
        border-color: var(--black);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      /* ── PAGES ── */
      .page {
        display: none;
        animation: fadeUp 250ms ease both;
      }
      .page.active {
        display: block;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── SECTION PADDING ── */
      .section {
        padding: 20px;
      }
      .section + .section {
        padding-top: 0;
      }

      /* ── CARD ── */
      .card {
        background: var(--white);
        border-radius: var(--radius-lg);
        border: 1px solid var(--gray-100);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
      }

      /* ── HERO ── */
      .hero {
        background: linear-gradient(135deg, var(--black) 0%, #1a1a2e 100%);
        border-radius: var(--radius-xl);
        padding: 28px 24px;
        margin: 20px;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: -60px;
        right: -60px;
        width: 200px;
        height: 200px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 50%;
      }
      .hero::after {
        content: "";
        position: absolute;
        bottom: -40px;
        left: -20px;
        width: 140px;
        height: 140px;
        background: rgba(255, 255, 255, 0.025);
        border-radius: 50%;
      }

      .hero-eyebrow {
        font-size: 10px;
        font-weight: 500;
        color: var(--gray-400);
        letter-spacing: 1.4px;
        text-transform: uppercase;
        font-family: var(--mono);
        margin-bottom: 10px;
      }
      .hero-title {
        font-size: 26px;
        font-weight: 600;
        color: var(--white);
        line-height: 1.2;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }
      .hero-sub {
        font-size: 13px;
        color: var(--gray-500);
        line-height: 1.5;
        margin-bottom: 24px;
      }

      /* ── BUDGET WIDGET ── */
      .budget-widget {
        position: relative;
      }
      .budget-label-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .budget-amount {
        font-size: 38px;
        font-weight: 600;
        color: var(--white);
        font-family: var(--mono);
        letter-spacing: -1px;
        line-height: 1;
      }
      .budget-currency {
        font-size: 20px;
        margin-right: 2px;
      }
      .budget-mood {
        font-size: 11px;
        color: var(--gray-400);
        text-align: right;
        max-width: 140px;
        line-height: 1.4;
      }

      .budget-slider {
        -webkit-appearance: none;
        width: 100%;
        height: 3px;
        border-radius: 10px;
        background: linear-gradient(
          to right,
          #fff 0%,
          #fff var(--pct),
          rgba(255, 255, 255, 0.15) var(--pct),
          rgba(255, 255, 255, 0.15) 100%
        );
        outline: none;
        cursor: pointer;
        margin-bottom: 8px;
        --pct: 40%;
      }
      .budget-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--white);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        transition: transform var(--transition);
        cursor: grab;
      }
      .budget-slider::-webkit-slider-thumb:hover {
        transform: scale(1.15);
      }
      .budget-slider::-webkit-slider-thumb:active {
        cursor: grabbing;
      }
      .budget-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--white);
        border: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        cursor: grab;
      }
      .budget-slider::-moz-range-thumb:active {
        cursor: grabbing;
      }
      .slider-range {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: var(--gray-600);
        font-family: var(--mono);
      }

      /* ── STATS ROW ── */
      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin: 20px;
      }
      .stat-card {
        background: var(--white);
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-md);
        padding: 14px 12px;
        box-shadow: var(--shadow-sm);
        transition: transform var(--transition);
      }
      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }
      .stat-label {
        font-size: 10px;
        color: var(--gray-400);
        font-weight: 500;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 6px;
        font-family: var(--mono);
      }
      .stat-value {
        font-size: 20px;
        font-weight: 600;
        color: var(--black);
        letter-spacing: -0.5px;
        font-family: var(--mono);
      }
      .stat-value.big {
        font-size: 17px;
      }

      /* ── SECTION HEADER ── */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .section-title {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }
      .section-action {
        font-size: 12px;
        color: var(--gray-400);
        cursor: pointer;
        font-weight: 500;
        background: none;
        border: none;
        transition: color var(--transition);
      }
      .section-action:hover {
        color: var(--black);
      }

      /* ── FILTER CHIPS ── */
      .filter-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding-bottom: 2px;
        margin-bottom: 14px;
      }
      .filter-row::-webkit-scrollbar {
        display: none;
      }
      .chip {
        flex-shrink: 0;
        padding: 7px 14px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 500;
        border: 1px solid var(--gray-200);
        background: var(--white);
        color: var(--gray-600);
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
      }
      .chip:hover {
        border-color: var(--gray-400);
        color: var(--black);
      }
      .chip.active {
        background: var(--black);
        border-color: var(--black);
        color: var(--white);
      }

      /* ── SEARCH BAR ── */
      .search-wrap {
        position: relative;
        margin-bottom: 14px;
      }
      .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 15px;
        color: var(--gray-400);
        pointer-events: none;
      }
      .search-input {
        width: 100%;
        padding: 11px 14px 11px 40px;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-md);
        background: var(--white);
        font-size: 14px;
        font-family: var(--font);
        color: var(--black);
        outline: none;
        transition:
          border-color var(--transition),
          box-shadow var(--transition);
        box-shadow: var(--shadow-sm);
      }
      .search-input:focus {
        border-color: var(--gray-400);
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
      }
      .search-input::placeholder {
        color: var(--gray-400);
      }

      /* ── MEAL CARDS ── */
      .meal-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .meal-card {
        background: var(--white);
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-lg);
        padding: 16px;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        cursor: pointer;
        transition: all var(--transition);
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
      }
      .meal-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: transparent;
        transition: background var(--transition);
      }
      .meal-card:hover {
        box-shadow: var(--shadow-md);
        border-color: var(--gray-200);
        transform: translateY(-1px);
      }
      .meal-card:hover::before {
        background: var(--black);
      }
      .meal-card.highlighted {
        border-color: var(--black);
        box-shadow: var(--shadow-md);
      }
      .meal-card.highlighted::before {
        background: var(--black);
      }
      .meal-card.best-value {
        background: linear-gradient(135deg, #fef9e7 0%, #fff 100%);
      }
      .meal-card.best-value::before {
        background: var(--accent-yellow);
      }

      .meal-emoji {
        width: 48px;
        height: 48px;
        background: var(--gray-50);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        flex-shrink: 0;
        border: 1px solid var(--gray-100);
        transition: transform var(--transition);
      }
      .meal-card:hover .meal-emoji {
        transform: scale(1.05);
      }

      .meal-info {
        flex: 1;
        min-width: 0;
      }
      .meal-name {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.2px;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .meal-place {
        font-size: 12px;
        color: var(--gray-500);
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .meal-meta {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .meta-tag {
        font-size: 10px;
        font-weight: 500;
        color: var(--gray-500);
        background: var(--gray-50);
        border: 1px solid var(--gray-100);
        border-radius: 100px;
        padding: 3px 8px;
        font-family: var(--mono);
      }
      .meta-tag.type {
        background: var(--gray-900);
        color: var(--gray-300);
        border-color: var(--gray-900);
      }
      .meta-tag.best-value {
        background: var(--accent-yellow);
        color: var(--black);
        border-color: var(--accent-yellow);
      }

      .meal-price-col {
        flex-shrink: 0;
        text-align: right;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }
      .meal-price {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--mono);
        letter-spacing: -0.5px;
        color: var(--black);
      }
      .meal-rating {
        font-size: 11px;
        color: var(--gray-500);
        display: flex;
        align-items: center;
        gap: 3px;
      }

      /* ── SKELETON LOADER ── */
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--gray-100) 0%,
          var(--gray-50) 50%,
          var(--gray-100) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 8px;
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      .skeleton-card {
        background: var(--white);
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-lg);
        padding: 16px;
        display: flex;
        gap: 14px;
      }

      /* ── EMPTY STATE ── */
      .empty-state {
        text-align: center;
        padding: 48px 24px;
      }
      .empty-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .empty-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .empty-sub {
        font-size: 13px;
        color: var(--gray-400);
        line-height: 1.5;
      }

      /* ── MAP PAGE ── */
      #map {
        width: 100%;
        height: calc(100dvh - var(--nav-h) - var(--bottom-nav-h) - 8px);
        border-radius: 0;
        z-index: 1;
      }
      .map-container {
        position: relative;
        overflow: hidden;
      }

      .map-overlay-top {
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        z-index: 10;
        display: flex;
        gap: 8px;
        pointer-events: none;
      }
      .map-overlay-top button {
        pointer-events: auto;
      }
      .map-btn {
        background: rgba(250, 250, 250, 0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-md);
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 500;
        font-family: var(--font);
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
        box-shadow: var(--shadow-md);
      }
      .map-btn:hover {
        background: var(--white);
        box-shadow: var(--shadow-lg);
      }
      .map-btn.primary {
        background: rgba(10, 10, 10, 0.9);
        color: var(--white);
        border-color: transparent;
      }
      .map-btn.primary:hover {
        background: var(--black);
      }

      /* Leaflet popup custom */
      .leaflet-popup-content-wrapper {
        border-radius: var(--radius-md) !important;
        box-shadow: var(--shadow-lg) !important;
        border: 1px solid var(--gray-200) !important;
        padding: 0 !important;
        overflow: hidden;
      }
      .leaflet-popup-content {
        margin: 0 !important;
      }
      .leaflet-popup-tip-container {
        display: none;
      }
      .map-popup {
        padding: 14px 16px;
        min-width: 200px;
      }
      .popup-name {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 3px;
      }
      .popup-price {
        font-size: 12px;
        color: var(--gray-500);
        font-family: var(--mono);
        margin-bottom: 6px;
      }
      .popup-desc {
        font-size: 12px;
        color: var(--gray-600);
        line-height: 1.4;
      }
      .popup-tag {
        display: inline-block;
        font-size: 10px;
        font-weight: 500;
        background: var(--gray-100);
        color: var(--gray-600);
        border-radius: 100px;
        padding: 2px 8px;
        margin-top: 8px;
        font-family: var(--mono);
      }

      /* ── FAVORITES PAGE ── */
      .fav-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px;
        text-align: center;
      }

      /* ── BOTTOM NAV ── */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(250, 250, 250, 0.92);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid var(--gray-100);
        height: var(--bottom-nav-h);
        display: flex;
        align-items: center;
        padding: 0 8px;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        gap: 0;
      }
      .nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        cursor: pointer;
        padding: 8px 4px;
        border-radius: var(--radius-md);
        transition: all var(--transition);

        localStorage.setItem("brokeModeRecent", "[]");
        renderRecent();
        showToast("Recently viewed cleared");
      }

      function renderRecent() {
        const section = document.getElementById("recent-section");
        const list = document.getElementById("recent-list");
        const recentMeals = recentlyViewed
          .map((id) => MEALS.find((m) => m.id === id))
          .filter((m) => m);

        if (recentMeals.length === 0) {
          section.style.display = "none";
          return;
        }

        section.style.display = "block";
        list.innerHTML = recentMeals
          .map(
            (meal) => `
          <div class="recent-card" onclick="viewMeal(${meal.id})">
            <div class="recent-emoji">${meal.emoji}</div>
            <div class="recent-name">${meal.name}</div>
            <div class="recent-price">₱${meal.price}</div>
          </div>
        `,
          )
          .join("");
      }

      function viewMeal(id) {
        const meal = MEALS.find((m) => m.id === id);
        if (meal) {
          addToRecent(id);
          highlightMealOnMap(meal);
        }
      }

      /* ════════════════════════════════════════════
   BUDGET SLIDER
   ════════════════════════════════════════════ */
      const slider = document.getElementById("budget-slider");
      const budgetDisplay = document.getElementById("budget-display");
      const budgetMood = document.getElementById("budget-mood");

      function updateBudget() {
        const val = parseInt(slider.value);
        budgetDisplay.textContent = val;
        budgetMood.textContent = getMood(val);
        const pct = ((val - 20) / (200 - 20)) * 100;
        slider.style.setProperty("--pct", pct + "%");
        renderMeals();
      }

      slider.addEventListener("input", updateBudget);
      updateBudget();

      /* ════════════════════════════════════════════
   FILTER CHIPS
   ════════════════════════════════════════════ */
      document.querySelectorAll(".chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          document
            .querySelectorAll(".chip")
            .forEach((c) => c.classList.remove("active"));
          chip.classList.add("active");
          selectedCat = chip.dataset.cat;
          renderMeals();
        });
      });

      /* ════════════════════════════════════════════
   FILTER + SORT LOGIC
   ════════════════════════════════════════════ */
      function getFiltered() {
        const budget = parseInt(slider.value);
        const query = document
          .getElementById("search-input")
          .value.toLowerCase()
          .trim();
        const sort = document.getElementById("sort-select").value;

        let results = MEALS.filter((m) => {
          const inBudget = m.price <= budget;
          const inCat = selectedCat === "all" || m.category === selectedCat;
          const inSearch =
            !query ||
            m.name.toLowerCase().includes(query) ||
            m.place.toLowerCase().includes(query) ||
            m.category.toLowerCase().includes(query);
          return inBudget && inCat && inSearch;
        });

        if (sort === "price") results.sort((a, b) => a.price - b.price);
        else if (sort === "rating") results.sort((a, b) => b.rating - a.rating);
        else if (sort === "distance")
          results.sort((a, b) => parseInt(a.distance) - parseInt(b.distance));
        else if (sort === "value")
          results.sort((a, b) => b.rating / b.price - a.rating / a.price);

        return results;
      }

      /* ════════════════════════════════════════════
   DEBOUNCE SEARCH
   ════════════════════════════════════════════ */
      function debouncedRender() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => renderMeals(), 300);
      }

      /* ════════════════════════════════════════════
   RENDER MEALS
   ════════════════════════════════════════════ */
      function renderMeals(highlight = null) {
        const meals = getFiltered();
        const wrap = document.getElementById("meal-list-wrap");
        const badge = document.getElementById("result-badge");
        const statCount = document.getElementById("stat-count");
        const statCheapest = document.getElementById("stat-cheapest");
        const statAvg = document.getElementById("stat-avg");

        badge.textContent = meals.length + " meals";
        statCount.textContent = meals.length;

        if (meals.length > 0) {
          const cheapest = Math.min(...meals.map((m) => m.price));
          const avg = Math.round(
            meals.reduce((s, m) => s + m.price, 0) / meals.length,
          );
          statCheapest.textContent = "₱" + cheapest;
          statAvg.textContent = "₱" + avg;

          // Find best value meal
          const bestValue = meals.reduce((best, current) =>
            current.rating / current.price > best.rating / best.price ?
              current
            : best,
          );
        } else {
          statCheapest.textContent = "—";
          statAvg.textContent = "—";
        }

        if (meals.length === 0) {
          wrap.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">😅</div>
              <div class="empty-title">No meals found</div>
              <div class="empty-sub">Try increasing your budget or clearing the search filter.</div>
            </div>`;
          return;
        }

        const gridWrap = document.createElement("div");
        gridWrap.className = "meal-grid";
        const listDiv = document.createElement("div");
        listDiv.className = "meal-list";
        gridWrap.appendChild(listDiv);

        const countEl = document.createElement("div");
        countEl.className = "result-count";
        countEl.textContent =
          meals.length + " result" + (meals.length !== 1 ? "s" : "");
        listDiv.appendChild(countEl);

        // Find best value
        const bestValueMeal = [...meals].sort(
          (a, b) => b.rating / b.price - a.rating / a.price,
        )[0];

        meals.forEach((meal) => {
          const isFav = favorites.has(meal.id);
          const isBestValue = meal.id === bestValueMeal.id;
          const card = document.createElement("div");
          card.className =
            "meal-card" +
            (highlight === meal.id ? " highlighted" : "") +
            (isBestValue ? " best-value" : "");
          card.dataset.id = meal.id;

          const metaTags = [
            `<span class="meta-tag type">${meal.category}</span>`,
            `<span class="meta-tag">📍 ${meal.distance}</span>`,
          ];
          if (isBestValue) {
            metaTags.push(
              `<span class="meta-tag best-value">🏆 Best Value</span>`,
            );
          }

          card.innerHTML = `
            <div class="meal-emoji">${meal.emoji}</div>
            <div class="meal-info">
              <div class="meal-name">${meal.name}</div>
              <div class="meal-place">${meal.place}</div>
              <div class="meal-meta">${metaTags.join("")}</div>
            </div>
            <div class="meal-price-col">
              <div class="meal-price">₱${meal.price}</div>
              <div class="meal-rating">⭐ ${meal.rating}</div>
              <button class="fav-btn ${isFav ? "active" : ""}" data-id="${meal.id}" title="Save meal"></button>
            </div>
          `;

          card.addEventListener("click", (e) => {
            if (
              e.target.classList.contains("fav-btn") ||
              e.target.closest(".fav-btn")
            )
              return;
            addToRecent(meal.id);
            highlightMealOnMap(meal);
          });

          listDiv.appendChild(card);
        });

        wrap.innerHTML = "";
        wrap.appendChild(gridWrap);

        wrap.querySelectorAll(".fav-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleFav(parseInt(btn.dataset.id));
          });
        });

        renderRecent();
      }

      /* ════════════════════════════════════════════
   SHOW SKELETON LOADERS
   ════════════════════════════════════════════ */
      function showSkeletons() {
        const wrap = document.getElementById("meal-list-wrap");
        let html = "";
        for (let i = 0; i < 4; i++) {
          html += `
            <div class="skeleton-card" style="margin-bottom:10px;">
              <div class="skeleton" style="width:48px;height:48px;border-radius:12px;flex-shrink:0;"></div>
              <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
                <div class="skeleton" style="height:14px;width:60%;"></div>
                <div class="skeleton" style="height:12px;width:40%;"></div>
                <div class="skeleton" style="height:12px;width:30%;"></div>
              </div>
              <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
                <div class="skeleton" style="height:16px;width:40px;"></div>
                <div class="skeleton" style="height:12px;width:32px;"></div>
              </div>
            </div>`;
        }
        wrap.innerHTML = html;
      }

      /* ════════════════════════════════════════════
   FAVORITES
   ════════════════════════════════════════════ */
      function toggleFav(id) {
        if (favorites.has(id)) {
          favorites.delete(id);
          showToast("Removed from saved");
        } else {
          favorites.add(id);
          showToast("Saved! 🤍");
        }
        localStorage.setItem("brokeModeFavs", JSON.stringify([...favorites]));
        renderMeals();
        renderFavs();
        updateFavBadges();
      }

      function renderFavs() {
        const list = document.getElementById("favs-list");
        const badge = document.getElementById("fav-count-badge");
        const favMeals = MEALS.filter((m) => favorites.has(m.id));
        badge.textContent = favMeals.length + " saved";

        if (favMeals.length === 0) {
          list.innerHTML = `
            <div class="fav-empty">
              <div style="font-size:48px;margin-bottom:12px;">🤍</div>
              <div class="empty-title">Nothing saved yet</div>
              <div class="empty-sub">Tap the heart icon on any meal to save it here for quick access.</div>
            </div>`;
          return;
        }

        list.innerHTML = "";
        const grid = document.createElement("div");
        grid.className = "meal-grid";
        const listDiv = document.createElement("div");
        listDiv.className = "meal-list";
        grid.appendChild(listDiv);

        favMeals.forEach((meal) => {
          const card = document.createElement("div");
          card.className = "meal-card";
          card.innerHTML = `
            <div class="meal-emoji">${meal.emoji}</div>
            <div class="meal-info">
              <div class="meal-name">${meal.name}</div>
              <div class="meal-place">${meal.place}</div>
              <div class="meal-meta">
                <span class="meta-tag type">${meal.category}</span>
                <span class="meta-tag">📍 ${meal.distance}</span>
              </div>
            </div>
            <div class="meal-price-col">
              <div class="meal-price">₱${meal.price}</div>
              <div class="meal-rating">⭐ ${meal.rating}</div>
              <button class="fav-btn active" data-id="${meal.id}"></button>
            </div>
          `;
          listDiv.appendChild(card);
        });

        list.appendChild(grid);

        list.querySelectorAll(".fav-btn").forEach((btn) => {
          btn.addEventListener("click", () =>
            toggleFav(parseInt(btn.dataset.id)),
          );
        });

        list.querySelectorAll(".meal-card").forEach((card) => {
          card.addEventListener("click", (e) => {
            if (
              e.target.classList.contains("fav-btn") ||
              e.target.closest(".fav-btn")
            )
              return;
            const id = parseInt(card.querySelector(".fav-btn").dataset.id);
            const meal = MEALS.find((m) => m.id === id);
            if (meal) {
              addToRecent(id);
              highlightMealOnMap(meal);
            }
          });
        });
      }

      function updateFavBadges() {
        const count = favorites.size;
        const navBadge = document.getElementById("nav-fav-badge");
        const sbBadge = document.getElementById("sb-fav-badge");
        const navFavs = document.getElementById("bn-favs");

        if (navFavs) {
          const icon = navFavs.querySelector(".nav-icon");
          if (icon) icon.textContent = count > 0 ? "❤️" : "🤍";
        }

        if (navBadge) {
          navBadge.style.display = count > 0 ? "flex" : "none";
          navBadge.textContent = count;
        }

        if (sbBadge) {
          sbBadge.style.display = count > 0 ? "flex" : "none";
          sbBadge.textContent = count;
        }

        const sbFavs = document.getElementById("sb-favs");
        if (sbFavs) {
          const span = sbFavs.querySelector("span:not(.badge)");
          if (span) span.textContent = count > 0 ? "❤️" : "🤍";
        }
      }

      /* ════════════════════════════════════════════
   MAP
   ════════════════════════════════════════════ */
      const ADNU_LAT = 13.6215;
      const ADNU_LNG = 123.194;

      function initMap() {
        if (mapInitialized) return;
        mapInitialized = true;

        setTimeout(() => {
          leafletMap = L.map("map", {
            center: [ADNU_LAT, ADNU_LNG],
            zoom: 16,
            zoomControl: true,
          });

          L.tileLayer(
            "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
            {
              attribution: "© OpenStreetMap © CARTO",
              maxZoom: 19,
            },
          ).addTo(leafletMap);

          const schoolIcon = L.divIcon({
            html: `<div style="background:#0a0a0a;border:3px solid #fff;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,0.3);">🏫</div>`,
            className: "",
            iconSize: [36, 36],
            iconAnchor: [18, 18],
          });

          L.marker([ADNU_LAT, ADNU_LNG], { icon: schoolIcon })
            .addTo(leafletMap)
            .bindPopup(
              '<div class="map-popup"><div class="popup-name">Ateneo de Naga University</div><div class="popup-desc">You are here (or close enough).</div></div>',
            );

          addMealMarkers();
          renderMapList();
          leafletMap.invalidateSize();
        }, 100);
      }

      function addMealMarkers() {
        markers.forEach((m) => {
          if (m._map) leafletMap.removeLayer(m);
        });
        markers = [];

        MEALS.forEach((meal) => {
          const icon = L.divIcon({
            html: `<div class="custom-pin"><span class="pin-emoji">${meal.emoji}</span></div>`,
            className: "",
            iconSize: [36, 36],
            iconAnchor: [18, 36],
            popupAnchor: [0, -36],
          });

          const marker = L.marker([meal.lat, meal.lng], { icon }).addTo(
            leafletMap,
          ).bindPopup(`
            <div class="map-popup">
              <div class="popup-name">${meal.emoji} ${meal.name}</div>
              <div class="popup-price">₱${meal.price} · ${meal.place}</div>
              <div class="popup-desc">${meal.desc}</div>
              <div>
                <span class="popup-tag">${meal.category}</span> 
                <span class="popup-tag">📍 ${meal.distance}</span> 
                <span class="popup-tag">⭐ ${meal.rating}</span>
              </div>
            </div>
          `);

          marker.on("click", () => addToRecent(meal.id));
          marker.mealId = meal.id;
          markers.push(marker);
        });
      }

      function renderMapList() {
        const sidebar = document.getElementById("map-list");
        if (!sidebar) return;
        sidebar.innerHTML = "";

        MEALS.slice(0, 10).forEach((meal) => {
          const card = document.createElement("div");
          card.style.cssText =
            "background:#fff;border:1px solid #efefef;border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all 150ms;";
          card.innerHTML = `
            <div style="display:flex;gap:10px;align-items:center;">
              <div style="width:36px;height:36px;background:#f7f7f7;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${meal.emoji}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${meal.name}</div>
                <div style="font-size:11px;color:#737373;">${meal.place} · ${meal.distance}</div>
              </div>
              <div style="font-size:14px;font-weight:600;font-family:var(--mono);flex-shrink:0;">₱${meal.price}</div>
            </div>`;

          card.addEventListener("click", () => {
            addToRecent(meal.id);
            const m = markers.find((mk) => mk.mealId === meal.id);
            if (m) {
              leafletMap.setView([meal.lat, meal.lng], 17);
              m.openPopup();
            }
          });

          card.addEventListener(
            "mouseenter",
            () => (card.style.boxShadow = "0 4px 12px rgba(0,0,0,0.08)"),
          );
          card.addEventListener(
            "mouseleave",
            () => (card.style.boxShadow = ""),
          );
          sidebar.appendChild(card);
        });
      }

      function highlightMealOnMap(meal) {
        switchPage("map");
        setTimeout(() => {
          if (leafletMap) {
            leafletMap.setView([meal.lat, meal.lng], 17);
            const m = markers.find((mk) => mk.mealId === meal.id);
            if (m) m.openPopup();
            showToast("Showing " + meal.name + " on map");
          }
        }, 350);
      }

      function findNearMe() {
        if (!leafletMap) return initMap();
        showToast("Locating you… 📍");

        if ("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const { latitude, longitude } = position.coords;
              leafletMap.setView([latitude, longitude], 17);
              showToast("Found you! 🎯");
            },
            () => {
              leafletMap.setView([ADNU_LAT + 0.001, ADNU_LNG - 0.001], 17);
              showToast("Using ADNU as fallback location 📍");
            },
          );
        } else {
          leafletMap.setView([ADNU_LAT + 0.001, ADNU_LNG - 0.001], 17);
          showToast("Using ADNU as fallback location 📍");
        }
      }

      function resetMapView() {
        if (leafletMap) leafletMap.setView([ADNU_LAT, ADNU_LNG], 16);
      }

      /* ════════════════════════════════════════════
   I'M HUNGRY BUTTON
   ════════════════════════════════════════════ */
      function imHungry() {
        slider.value = 50;
        updateBudget();
        selectedCat = "all";
        document
          .querySelectorAll(".chip")
          .forEach((c) =>
            c.classList.toggle("active", c.dataset.cat === "all"),
          );
        document.getElementById("search-input").value = "";
        document.getElementById("sort-select").value = "price";

        switchPage("home");
        showToast("Finding the cheapest meals! 😭");

        setTimeout(() => {
          document
            .getElementById("meal-list-wrap")
            .scrollIntoView({ behavior: "smooth", block: "start" });
        }, 200);
      }

      /* ════════════════════════════════════════════
   PAGE NAVIGATION
   ════════════════════════════════════════════ */
      function switchPage(page) {
        currentPage = page;

        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById("page-" + page).classList.add("active");

        ["home", "map", "favs"].forEach((p) => {
          document
            .getElementById("bn-" + p)
            ?.classList.toggle("active", p === page);
        });

        ["home", "map", "favs"].forEach((p) => {
          const el = document.getElementById("sb-" + p);
          if (el) el.classList.toggle("active", p === page);
        });

        if (page === "map") {
          initMap();
          const sidebar = document.getElementById("map-sidebar");
          if (window.innerWidth >= 1024) sidebar.style.display = "block";
          setTimeout(() => {
            if (leafletMap) leafletMap.invalidateSize();
          }, 300);
        }

        if (page === "favs") renderFavs();
        if (page === "home") renderRecent();

        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      /* ════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════ */
      let toastTimer;
      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
      }

      /* ════════════════════════════════════════════
   DESKTOP MAP SIDEBAR
   ════════════════════════════════════════════ */
      function handleResize() {
        const sidebar = document.getElementById("map-sidebar");
        if (!sidebar) return;
        if (window.innerWidth >= 1024 && currentPage === "map") {
          sidebar.style.display = "block";
        } else if (window.innerWidth < 1024) {
          sidebar.style.display = "none";
        }
        if (leafletMap && currentPage === "map") {
          setTimeout(() => leafletMap.invalidateSize(), 100);
        }
      }
      window.addEventListener("resize", handleResize);

      /* ════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════ */
      window.addEventListener("DOMContentLoaded", () => {
        updateFavBadges();
        showSkeletons();
        setTimeout(() => {
          renderMeals();
          renderRecent();
        }, 900);
      });
    </script>
  </body>
</html>
